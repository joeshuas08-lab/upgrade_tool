# GitHub Actions — upgrade_tool
# Build statically-linked binaries on native amd64 and arm64 runners.
# On tag push: create a GitHub Release with .deb packages + raw binaries.

name: build-and-release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential cmake libusb-1.0-0-dev

      - name: Prepare libudev-zero
        run: |
          mkdir -p build/third_party
          git clone --depth 1 --branch 1.0.3 \
            https://github.com/illiliti/libudev-zero.git build/third_party/libudev-zero-src

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -- -j$(nproc)

      - name: Set version
        id: ver
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            V="${{ github.ref_name }}"
            echo "ver=${V#v}" >> $GITHUB_OUTPUT
          else
            echo "ver=0.0.0+${GITHUB_SHA::10}" >> $GITHUB_OUTPUT
          fi

      - name: Package .deb
        env:
          VER: ${{ steps.ver.outputs.ver }}
        run: |
          mkdir -p dist
          cp build/upgrade_tool "dist/upgrade_tool-${VER}-${{ matrix.arch }}-static"
          ./scripts/package-deb.sh build/upgrade_tool ${{ matrix.arch }} dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: upgrade_tool-${{ matrix.arch }}
          path: |
            dist/*.deb
            dist/upgrade_tool-*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: upgrade_tool-*
          merge-multiple: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "=== Working directory ==="
          pwd
          echo "=== File tree ==="
          find . -type f -not -path './.git/*' | sort
          echo "=== dist/ ==="
          ls -laR dist/ 2>/dev/null || echo "no dist/ dir"

          # Collect asset files
          ASSETS=$(find . -type f \( -name '*.deb' -o -name 'upgrade_tool-*' \) -print)
          echo "=== Assets found ==="
          echo "$ASSETS"

          cat > /tmp/release-notes.md <<'NOTES'
          Pre-built statically-linked binaries for Debian 11 (Bullseye) and later.

          **Assets:**
          - .deb packages for amd64 and arm64
          - Raw static binaries for amd64 and arm64

          All binaries are statically linked — zero runtime dependencies.
          NOTES

          # shellcheck disable=SC2086
          gh release create "${{ github.ref_name }}" \
            --title "upgrade_tool ${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md \
            $ASSETS
